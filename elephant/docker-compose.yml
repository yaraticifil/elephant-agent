services:
  # ── INFRASTRUCTURE ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: elephant-postgres
    environment:
      POSTGRES_DB: elephant
      POSTGRES_USER: elephant
      POSTGRES_PASSWORD: elephant123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - elephant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elephant"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: elephant-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - elephant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15

  qdrant:
    image: qdrant/qdrant:latest
    container_name: elephant-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - elephant-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: elephant-neo4j
    environment:
      NEO4J_AUTH: neo4j/elephant123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - elephant-network
    restart: unless-stopped

  # ── SHARED BUILD CONFIG ───────────────────────────────────────────────────
  # All Python services use this single Dockerfile built from the project root
  # Build context = . (project root) so shared/ and services/ are available

  # ── ORCHESTRATOR ──────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elephant-orchestrator
    command: uvicorn services.orchestrator.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment: &common-env
      POSTGRES_URL: postgresql+asyncpg://elephant:elephant123@postgres:5432/elephant
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: elephant123
      ORCHESTRATOR_URL: http://orchestrator:8000
      ELEPHANT_ENV: development
      LOG_LEVEL: INFO
      HEARTBEAT_INTERVAL_SECONDS: "30"
      DAILY_BUDGET_USD: "10.00"
      AUDITOR_TOKEN_SECRET: elephant-auditor-secret-v1
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/vertex-key.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./secrets:/app/secrets:ro
    networks:
      - elephant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ── AGENTS ────────────────────────────────────────────────────────────────
  agent_interacter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elephant-agent-interacter
    command: python -m services.agents.interacter.agent
    ports:
      - "8010:8010"
    environment:
      <<: *common-env
      AGENT_NAME: interacter
    depends_on:
      orchestrator:
        condition: service_healthy
    volumes:
      - ./secrets:/app/secrets:ro
    networks:
      - elephant-network
    restart: unless-stopped

  agent_planner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elephant-agent-planner
    command: python -m services.agents.planner.agent
    environment:
      <<: *common-env
      AGENT_NAME: planner
    depends_on:
      orchestrator:
        condition: service_healthy
    volumes:
      - ./secrets:/app/secrets:ro
    networks:
      - elephant-network
    restart: unless-stopped

  agent_researcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elephant-agent-researcher
    command: python -m services.agents.researcher.agent
    environment:
      <<: *common-env
      AGENT_NAME: researcher
    depends_on:
      orchestrator:
        condition: service_healthy
    volumes:
      - ./secrets:/app/secrets:ro
    networks:
      - elephant-network
    restart: unless-stopped

  agent_creator:
